name: Build DomeWork Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - domework

permissions:
  contents: write

# Prevent concurrent builds
concurrency:
  group: build-domework
  cancel-in-progress: false

jobs:
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: domework

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-macos:
    name: Build macOS
    needs: version
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: domework

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Node.js binaries
        run: pnpm -F @domework/desktop download:nodejs

      - name: Build desktop app
        run: pnpm -F @domework/desktop build

      - name: Package macOS (ARM64 + x64)
        run: |
          node scripts/package.cjs --mac --arm64 --x64 --publish never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON: python
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: DomeWork-macOS
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          retention-days: 30

  build-linux:
    name: Build Linux
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: domework

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Node.js binaries
        run: pnpm -F @domework/desktop download:nodejs

      - name: Build desktop app
        run: pnpm -F @domework/desktop build

      - name: Package Linux (x64 + ARM64)
        run: |
          node scripts/package.cjs --linux --x64 --arm64 --publish never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: DomeWork-Linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          retention-days: 30

  build-windows:
    name: Build Windows
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: domework

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Node.js binaries
        run: pnpm -F @domework/desktop download:nodejs

      - name: Build desktop app
        run: pnpm -F @domework/desktop build

      - name: Package Windows (x64)
        run: |
          node scripts/package.cjs --win --x64 --publish never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: DomeWork-Windows
          path: apps/desktop/release/*.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [version, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: DomeWork-macOS
          path: ./release/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: DomeWork-Linux
          path: ./release/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: DomeWork-Windows
          path: ./release/windows

      - name: List release artifacts
        run: |
          echo "Release artifacts:"
          find ./release -type f 2>/dev/null || echo "No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: DomeWork ${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./release/macos/*
            ./release/linux/*
            ./release/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
